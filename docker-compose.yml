version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: omnisup-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - omnisup-network

  redis:
    image: redis:7-alpine
    container_name: omnisup-redis
    restart: always
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redisdata:/data
    networks:
      - omnisup-network

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local

networks:
  omnisup-network:
    driver: bridge